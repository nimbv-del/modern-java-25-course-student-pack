# Dev environment for the course. Infra (postgres, kafka, kafka-ui) starts by default.
# App services run under the `apps` profile; observability under the `observability` profile.
#
# AutoMQ note: the course uses AutoMQ, a Kafka-API-compatible broker backed by object storage.
# For local teaching, plain Apache Kafka (below) behaves identically from the client side.
# To switch to AutoMQ, swap the `kafka` image and follow AutoMQ's single-node compose guide;
# the Quarkus client config does not change.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    # Host port is overridable (default 5432) so it won't clash with another local Postgres;
    # services inside the network always reach this DB as `postgres:5432`.
    ports: ["${POSTGRES_HOST_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    ports: ["${KAFKA_INTERNAL_HOST_PORT:-9092}:9092", "${KAFKA_HOST_PORT:-29092}:29092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # Visual aid for students: see topics, partitions, consumer groups, and messages.
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports: ["${KAFKA_UI_HOST_PORT:-8081}:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  kyc-service:
    profiles: ["apps"]
    build: ../apps/kyc-service
    ports: ["8080:8080"]
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/orders
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  screening-service:
    profiles: ["apps"]
    build: ../apps/screening-service
    # Published so the demo can read GET /screenings from the host (and Postman). Host port is
    # overridable and defaults to 8082 to avoid clashing with the KYC service on 8080.
    ports: ["${SCREENING_HOST_PORT:-8082}:8080"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka: { condition: service_started }

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes: ["./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml"]
    ports: ["4317:4317"]

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    volumes: ["./observability/prometheus.yml:/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes: ["./observability/grafana:/etc/grafana/provisioning/datasources"]
    depends_on: [prometheus]

volumes:
  pgdata:
